worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;

    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=IMAGE_CACHE:50m max_size=1g inactive=1h use_temp_path=off;

    upstream api {
        least_conn;
        server api:3000 max_fails=3 fail_timeout=30s;
        server api:3000 max_fails=3 fail_timeout=30s;
    }

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=public_limit:10m rate=200r/m;

    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        location /u/ {
            limit_req zone=public_limit burst=50 nodelay;
            proxy_pass http://api;
            proxy_cache IMAGE_CACHE;
            proxy_cache_valid 200 1h;
            proxy_cache_key "$uri";
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /t/ {
            limit_req zone=public_limit burst=50 nodelay;
            proxy_pass http://api;
            proxy_cache IMAGE_CACHE;
            proxy_cache_valid 200 1h;
            proxy_cache_key "$uri";
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        location /metrics {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /health {
            access_log off;
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }
}
